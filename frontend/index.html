<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duck Hunt</title>
    <!--
      NES-style pixel font — self-hosted to avoid external CDN dependency.
      Place PressStart2P-Regular.woff2 (OFL licensed, available from Google Fonts)
      at frontend/public/fonts/PressStart2P-Regular.woff2 before building.
    -->
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        src: url('/fonts/PressStart2P-Regular.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      /* Nearest-neighbor scaling gives the correct pixelated NES look */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        cursor: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
